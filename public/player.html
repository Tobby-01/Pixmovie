<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PixMovie Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-glow"></div>
    <header class="topbar">
      <div class="brand">PixMovie</div>
      <nav class="nav-links">
        <a href="index.html">Library</a>
        <a href="index.html#seriesSection">Series</a>
        <a href="people.html">Creators</a>
        <a id="uploadLink" href="upload.html">Upload</a>
        <a id="profileLink" href="profile.html">Profile</a>
        <a href="settings.html">Settings</a>
      </nav>
    </header>

    <div class="player-shell">
      <h2 id="playerTitle">Loading...</h2>
      <p id="playerMeta" class="movie-meta"></p>
      <div id="playerBanner" class="player-banner hidden">
        <img id="playerBannerImg" alt="Movie header" />
      </div>
      <div class="player-actions">
        <div class="pill-group">
          <button id="streamBtn" class="pill active" type="button">Stream</button>
          <button id="swarmBtn" class="pill" type="button">Swarm</button>
          <button id="lowDataBtn" class="pill" type="button">Low Data (240p)</button>
        </div>
        <div class="player-cta">
          <button id="watchlistBtn" class="btn ghost small" type="button">Add to Watchlist</button>
          <button id="fullscreenBtn" class="icon-btn" type="button" title="Full screen">
            Full
          </button>
        </div>
      </div>
      <video id="video" controls></video>
      <div class="progress">
        <div id="progressBar" class="progress-bar"></div>
      </div>
      <div class="hls-progress hidden" id="hlsProgress">
        <div class="hls-progress-bar" id="hlsProgressBar"></div>
      </div>
      <div class="hls-progress-meta hidden" id="hlsProgressMeta">Preparing stream...</div>
      <p id="playerStatus" class="movie-meta"></p>
      <div class="stats-row">
        <div class="stat">
          <h3 id="statPeers">0</h3>
          <span>Peers</span>
        </div>
        <div class="stat">
          <h3 id="statLive">0</h3>
          <span>Watching Now</span>
        </div>
        <div class="stat">
          <h3 id="statSpeed">0 MB/s</h3>
          <span>Download Speed</span>
        </div>
        <div class="stat">
          <h3 id="statProgress">0%</h3>
          <span>Progress</span>
        </div>
      </div>

      <div class="ratings-panel">
        <div class="ratings-header">
          <h3>Ratings & Feedback</h3>
          <div id="ratingSummary" class="badge">No ratings</div>
        </div>
        <div id="ratingForm" class="rating-form">
          <div id="ratingStars" class="rating-stars"></div>
          <textarea
            id="ratingComment"
            class="input"
            rows="3"
            placeholder="Share feedback (optional)"
          ></textarea>
          <button id="ratingSubmit" class="btn sun" type="button">Submit Rating</button>
          <div id="ratingMessage" class="movie-meta"></div>
        </div>
        <div id="ratingList" class="rating-list"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="config.js"></script>
    <script src="shared.js"></script>
    <script src="player.js"></script>
  </body>
</html>
