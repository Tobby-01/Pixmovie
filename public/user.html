<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PixMovie Creator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-glow"></div>
    <header class="topbar">
      <div class="brand">PixMovie</div>
      <nav class="nav-links">
        <a href="index.html">Library</a>
        <a href="index.html#seriesSection">Series</a>
        <a href="people.html">Creators</a>
        <a id="uploadLink" href="upload.html">Upload</a>
        <a id="profileLink" href="profile.html">Profile</a>
        <a href="settings.html">Settings</a>
      </nav>
      <div class="auth-actions">
        <a id="loginLink" class="btn ghost" href="login.html">Log In</a>
        <a id="signupLink" class="btn" href="signup.html">Sign Up</a>
        <span id="navUser" class="badge" style="display: none"></span>
        <button id="logoutBtn" class="btn ghost" style="display: none">Logout</button>
      </div>
    </header>

    <main class="container">
      <section class="panel profile-panel">
        <div class="profile-header">
          <img id="userAvatar" class="avatar" src="" alt="Creator avatar" />
          <div>
            <h2 id="userName">Creator</h2>
            <p id="userBio" class="movie-meta"></p>
            <div class="profile-stats">
              <span id="userFollowers" class="stat-mini">0 followers</span>
              <span id="userFollowing" class="stat-mini">0 following</span>
              <span id="userUploads" class="stat-mini">0 uploads</span>
            </div>
          </div>
        </div>
        <div class="user-actions">
          <button id="followBtn" class="btn sun small" type="button">Follow</button>
        </div>
      </section>

      <section class="panel">
        <h2>Uploads</h2>
        <div id="userUploadsGrid" class="movie-grid"></div>
      </section>
    </main>

    <div class="footer">Discover creators and follow their latest uploads.</div>

    <script src="config.js"></script>
    <script src="shared.js"></script>
    <script src="user.js"></script>
  </body>
</html>
