<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PixMovie Creators</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-glow"></div>
    <header class="topbar">
      <div class="brand">PixMovie</div>
      <nav class="nav-links">
        <a href="index.html">Library</a>
        <a href="index.html#seriesSection">Series</a>
        <a href="people.html">Creators</a>
        <a id="uploadLink" href="upload.html">Upload</a>
        <a id="profileLink" href="profile.html">Profile</a>
        <a href="settings.html">Settings</a>
      </nav>
      <div class="auth-actions">
        <a id="loginLink" class="btn ghost" href="login.html">Log In</a>
        <a id="signupLink" class="btn" href="signup.html">Sign Up</a>
        <span id="navUser" class="badge" style="display: none"></span>
        <button id="logoutBtn" class="btn ghost" style="display: none">Logout</button>
      </div>
    </header>

    <main class="container">
      <section class="page-hero">
        <div>
          <h1>Creators</h1>
          <p>Follow creators, explore their profiles, and see what they are streaming.</p>
        </div>
      </section>

      <section class="panel">
        <div class="row-header">
          <h2>Discover</h2>
          <span class="row-subtitle">Search creators by name.</span>
        </div>
        <input id="peopleSearch" class="input" placeholder="Search creators..." />
        <div id="peopleGrid" class="user-grid"></div>
      </section>
    </main>

    <div class="footer">Follow creators you love and build your watch circle.</div>

    <script src="config.js"></script>
    <script src="shared.js"></script>
    <script src="people.js"></script>
  </body>
</html>
