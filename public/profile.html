<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PixMovie Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-glow"></div>
    <header class="topbar">
      <div class="brand">PixMovie</div>
      <nav class="nav-links">
        <a href="index.html">Library</a>
        <a id="uploadLink" href="upload.html">Upload</a>
        <a id="profileLink" href="profile.html">Profile</a>
      </nav>
      <div class="auth-actions">
        <a id="loginLink" class="btn ghost" href="login.html">Log In</a>
        <a id="signupLink" class="btn" href="signup.html">Sign Up</a>
        <span id="navUser" class="badge" style="display: none"></span>
        <button id="logoutBtn" class="btn ghost" style="display: none">Logout</button>
      </div>
    </header>

    <main class="container">
      <section class="page-hero">
        <div>
          <h1>Your Profile</h1>
          <p>Manage your account and keep your uploads in control.</p>
        </div>
      </section>

      <section class="panel profile-panel">
        <div class="profile-header">
          <img id="profileAvatar" class="avatar" src="" alt="Profile avatar" />
          <div>
            <h2 id="profileName">Loading...</h2>
            <p id="profileEmail" class="movie-meta"></p>
          </div>
        </div>

        <form id="profileForm" class="form-grid">
          <input class="input" name="username" placeholder="Update username" />
          <input class="input" type="file" name="avatar" accept="image/*" />
          <button class="btn sun" type="submit">Save Profile</button>
        </form>
        <p id="profileMessage" class="movie-meta"></p>
      </section>

      <section class="panel">
        <h2>Your Uploads</h2>
        <div id="profileMovies" class="movie-grid"></div>
      </section>

      <section class="panel">
        <h2>Creator Dashboard</h2>
        <canvas id="analyticsChart" height="140"></canvas>
        <div class="stats-row">
          <div class="stat">
            <h3 id="statUploads">0</h3>
            <span>Uploads</span>
          </div>
          <div class="stat">
            <h3 id="statViews">0</h3>
            <span>Total Views</span>
          </div>
          <div class="stat">
            <h3 id="statBandwidth">0 GB</h3>
            <span>Estimated Bandwidth</span>
          </div>
        </div>
      </section>
    </main>

    <div class="footer">PixMovie is built for sharing. Seed responsibly.</div>

    <script src="config.js"></script>
    <script src="shared.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="profile.js"></script>
  </body>
</html>
